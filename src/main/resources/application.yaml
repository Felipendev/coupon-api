spring:
  application:
    name: coupon-api
  datasource:
    url: jdbc:h2:mem:coupondb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.challenge.coupon: INFO
    org.hibernate.SQL: DEBUG
