spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: coupon-api
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.challenge.coupon: INFO
    org.hibernate.SQL: DEBUG
